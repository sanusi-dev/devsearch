{% extends "main.html" %}
{% block content %}
    {% partialdef delete-confirm-partial inline %}
    <main class="my-[8rem] animate-fade-in" id="delete-container">
        <div class="content-box text-center">
            <h3 class="text-[2.4rem] font-bold text-sub mb-[1rem]">Delete Skill</h3>
            <p class="text-[1.6rem] text-text/70 my-[2rem]">
                Are you sure you want to delete <strong class="text-sub">{{ skill|title }}</strong>?
            </p>
            <div class="flex justify-center gap-[1.5rem] mt-[3rem]">
                <a class="btn btn--transparent text-[1.4rem]"
                   href="{% url 'account' %}"
                   hx-target="#delete-container"
                   hx-swap="outerHTML show:window:top">&#x2190 Go Back</a>
                <form hx-post="{% url 'delete_skill' skill.id %}"
                      hx-target="#delete-container"
                      hx-swap="outerHTML">
                    <input class="btn bg-error text-white border-error hover:bg-error/80 hover:border-error/80 text-[1.4rem]"
                           type="submit"
                           value="Delete" />
                </form>
            </div>
        </div>
    </main>
{% endpartialdef %}
{% endblock content %}
