{% extends "main.html" %}
{% load static %}
{% block content %}
  <!-- Main Section -->
  <main class="messagePage my-xl">
    <div class="content-box">
      <div class="message">
        <a class="backButton" href="{% url 'inbox' %}"><i class="im im-angle-left"></i></a>
        <h2 class="message__subject">
          {{ message.subject }}
        </h4>
        {% if message.sender %}
          <a href="{% url 'profile_detail' message.sender.id %}"
             class="message__author">{{ message.sender.name }}</a>
        {% else %}
          <p class="message__date">{{ message.name }}</p>
          <p class="message__date">{{ message.email }}</p>
        {% endif %}
        <p class="message__date">{{ message.created_at }}</p>
        <div class="message__body">{{ message.body|linebreaksbr }}</div>
      </div>
    </div>
  </main>
{% endblock content %}
