{% extends "main.html" %}
{% load static %}
{% block content %}
    <!-- Main Section -->
    <main class="formPage my-xl">
        <div class="content-box">
            <div class="formWrapper">
                <a class="backButton" href="{% url 'profile_detail' pk=recipient.id %}"><i class="im im-angle-left"></i></a>
                <br />
                <form class="form" method="post">
                    {% csrf_token %}
                    {% if request.user.is_authenticated %}
                        <div class="form__field">
                            <label for="formInput#text">{{ message_form.subject.label }}</label>
                            {{ message_form.subject }}
                        </div>
                        <div class="form__field">
                            <label for="formInput#text">{{ message_form.body.label }}</label>
                            {{ message_form.body }}
                        </div>
                    {% else %}
                        {% for field in message_form %}
                            <!-- Input:Text -->
                            <div class="form__field">
                                <label for="formInput#text">{{ field.label }}</label>
                                {{ field }}
                            </div>
                        {% endfor %}
                    {% endif %}
                    <input class="btn btn--sub btn--lg my-md" type="submit" value="Submit" />
                </form>
            </div>
        </div>
    </main>
{% endblock content %}
