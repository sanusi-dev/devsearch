{% extends "main.html" %}
{% load static %}
{% block content %}
    <div class="relative w-full min-h-[85vh] flex justify-center items-center z-10 bg-transparent py-[2rem]"
         id="auth-error-container">
        <div class="fixed inset-0 z-[-1] bg-gradient-to-br from-sub via-sub-light/80 to-main/40"></div>
        <div class="fixed inset-0 z-[-1] bg-[radial-gradient(ellipse_at_top_right,rgba(90,165,185,0.2)_0%,transparent_60%)]">
        </div>
        <div class="card w-[95%] max-w-[55rem] p-[3rem_3.5rem] sm:p-[5rem_6rem] shadow-[0_8px_40px_rgba(0,0,0,0.2)] border-white/10 animate-slide-up text-center">
            <div class="text-center">
                <a href="/" class="inline-block">
                    <img src="{% static 'images/icon.svg' %}"
                         alt="icon"
                         class="mx-auto h-[5rem]" />
                </a>
                <h3 class="text-[2.8rem] text-error font-bold mt-[1.5rem]">Login Failed</h3>
                <p class="font-normal text-[1.5rem] text-text/80 my-[2rem]">
                    An error occurred while attempting to login via your third-party account.
                </p>
            </div>
            <div class="my-[2.5rem]">
                <a href="{% url 'login' %}"
                   class="btn btn--sub text-[1.4rem]"
                   hx-target="#auth-error-container"
                   hx-swap="outerHTML">Back to Login</a>
            </div>
        </div>
    </div>
{% endblock content %}
