{% extends "auth_base.html" %}
{% load static %}

{% block title %}Login failed - DevSearch{% endblock title %}

{% block content %}
    <div class="min-h-screen flex items-center justify-center px-4 py-8 sm:py-12 bg-sub" id="auth-error-container">
        <div class="w-full max-w-[38rem] card shadow-[0_10px_50px_rgba(0,0,0,0.25)] animate-slide-up text-center">
            <div>
                <a href="/">
                    <img src="{% static 'images/icon.svg' %}" alt="DevSearch" class="mx-auto h-16 sm:h-20" />
                </a>
                <h1 class="mt-6 text-[2.2rem] sm:text-[2.5rem] text-error font-semibold tracking-tight">Login failed</h1>
                <p class="mt-3 text-[1.5rem] text-text/80 max-w-[30rem] mx-auto">
                    Something went wrong while signing in with the third-party account.
                </p>
            </div>
            <div class="mt-8">
                <a href="{% url 'login' %}" class="btn btn--sub text-[1.45rem]" hx-target="#auth-error-container" hx-swap="outerHTML">Back to login</a>
            </div>
        </div>
    </div>
{% endblock content %}
