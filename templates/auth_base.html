{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description"
              content="DevSearch - Connect with Developers! Find and collaborate with talented developers in your area." />
        <link rel="shortcut icon" href="{% static 'images/favicon.ico' %}" type="image/x-icon" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/iconmonstr-iconic-font@1.3.0/iconmonstr-iconic-font.min.css" />
        <link rel="stylesheet" href="{% static 'styles/output.css' %}" />
        <script src="{% static 'js/htmx.min.js' %}" defer></script>
        <title>{% block title %}DevSearch{% endblock title %}</title>
    </head>
    <body class="bg-sub">
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script id="django-messages" type="application/json">
            [
                {% for message in messages %}
                    {"message": "{{ message|escapejs }}", "tags": "{{ message.tags }}"}{% if not forloop.last %},{% endif %}
                {% endfor %}
            ]
        </script>

        {% block content %}
        {% endblock content %}

        <script src="{% static 'js/main.js' %}" defer></script>
        <script>
            // Password visibility toggles for auth forms
            function initPasswordToggles() {
                document.querySelectorAll('.js-password-toggle').forEach(wrapper => {
                    const input = wrapper.querySelector('input[type="password"], input[type="text"]');
                    const btn = wrapper.querySelector('button');
                    if (!input || !btn) return;

                    btn.addEventListener('click', (e) => {
                        e.preventDefault();
                        if (input.type === 'password') {
                            input.type = 'text';
                            btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-1.597 2.905" /></svg>';
                        } else {
                            input.type = 'password';
                            btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>';
                        }
                    });
                });
            }
            document.addEventListener('DOMContentLoaded', initPasswordToggles);
            document.addEventListener('htmx:afterSwap', initPasswordToggles);
        </script>
    </body>
</html>
