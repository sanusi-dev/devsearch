{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description"
              content="DevSearch - Connect with Developers! Find and collaborate with talented developers in your area." />
        <meta name="keywords"
              content="developers, programming, collaboration, coding, tech" />
        <!-- Favicon -->
        <link rel="shortcut icon"
              href="{% static 'images/favicon.ico' %}"
              type="image/x-icon" />
        <!-- Icon - IconMonster -->
        {% comment %} <link rel="stylesheet"
              href="https://cdn.iconmonstr.com/1.3.0/css/iconmonstr-iconic-font.min.css" /> {% endcomment %}
        <!-- DevSearch UI (Tailwind) -->
        <link rel="stylesheet" href="{% static 'styles/output.css' %}" />
        <!-- HTMX -->
        <script src="{% static 'js/htmx.min.js' %}" defer></script>
        <title>DevSearch - Connect with Developers!</title>
    </head>
    <body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}' hx-boost="true">
        {% include "navbar.html" %}
        <!-- Toast Messages (HTMX OOB target) -->
        <div id="toast-container"
             class="fixed top-[8rem] right-[2rem] z-[200] space-y-[1rem] max-w-[40rem]">
            {% for message in messages %}
                <div class="toast bg-sub/95 backdrop-blur-md text-white px-[2rem] py-[1.2rem] rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.2)] text-[1.4rem] animate-slide-up border border-white/10
                            {% if message.tags == 'error' %}!border-error/30 !bg-error/90{% endif %}
                            {% if message.tags == 'success' %}!border-emerald-400/30 !bg-emerald-600/90{% endif %}
                            {% if message.tags == 'warning' %}!border-amber-400/30 !bg-amber-600/90{% endif %}">{{ message }}</div>
            {% endfor %}
        </div>
        <div id="main-content">
            {% block content %}
            {% endblock content %}
        </div>
        <script src="{% static 'js/main.js' %}" defer></script>
    </body>
</html>
