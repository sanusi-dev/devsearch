{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description"
              content="DevSearch - Connect with Developers! Find and collaborate with talented developers in your area." />
        <meta name="keywords"
              content="developers, programming, collaboration, coding, tech" />
        <!-- Favicon -->
        <link rel="shortcut icon"
              href="{% static 'images/favicon.ico' %}"
              type="image/x-icon" />
        <!-- Icon - IconMonster -->
        <link rel="stylesheet"
              href="https://cdn.iconmonstr.com/1.3.0/css/iconmonstr-iconic-font.min.css" />
        <!-- DevSearch UI (Tailwind) -->
        <link rel="stylesheet" href="{% static 'styles/output.css' %}" />
        <title>DevSearch - Connect with Developers!</title>
    </head>
    <body>
        {% include "navbar.html" %}
        {% block content %}
        {% endblock content %}
    </body>
    <script src="{% static 'uikit/app.js' %}"></script>
</html>
