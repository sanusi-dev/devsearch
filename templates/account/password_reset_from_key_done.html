{% extends "auth_base.html" %}
{% load static %}

{% block title %}Password changed - DevSearch{% endblock title %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-8 sm:py-12 bg-sub">
    <div class="w-full max-w-[38rem] card shadow-[0_10px_50px_rgba(0,0,0,0.25)] animate-slide-up text-center">
        <div>
            <a href="/">
                <img src="{% static 'images/icon.svg' %}" alt="DevSearch" class="mx-auto h-16 sm:h-20" />
            </a>
            <div class="mt-8 mb-4 flex justify-center">
                <div class="w-20 h-20 rounded-full bg-emerald-500/15 border border-emerald-500/25 flex items-center justify-center">
                    <svg class="w-10 h-10 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
            </div>
            <h1 class="text-[2.2rem] sm:text-[2.5rem] text-sub font-semibold tracking-tight">All done!</h1>
            <p class="mt-3 text-[1.5rem] text-text/80 max-w-[32rem] mx-auto">
                Your password has been updated successfully. You can now sign in with your new password.
            </p>
        </div>

        <div class="mt-8">
            <a href="{% url 'account_login' %}" class="btn btn--sub text-[1.45rem]">Log in</a>
        </div>
    </div>
</div>
{% endblock content %}
