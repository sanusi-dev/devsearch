{% extends "main.html" %}
{% load static %}

{% block content %}
<div class="relative w-full min-h-[85vh] flex justify-center items-center z-10 bg-transparent py-[2rem]">
    <div class="fixed inset-0 z-[-1] bg-gradient-to-br from-sub via-sub-light/80 to-main/40"></div>
    <div class="fixed inset-0 z-[-1] bg-[radial-gradient(ellipse_at_top_right,rgba(90,165,185,0.2)_0%,transparent_60%)]"></div>
    
    <div class="card w-[95%] max-w-[55rem] p-[3rem_3.5rem] sm:p-[5rem_6rem] shadow-[0_8px_40px_rgba(0,0,0,0.2)] border-white/10 animate-slide-up text-center">
        <div class="text-center">
            <a href="/" class="inline-block">
                <img src="{% static 'images/icon.svg' %}" alt="icon" class="mx-auto h-[5rem]" />
            </a>
            <div class="my-[2rem] flex justify-center">
                <div class="w-[6rem] h-[6rem] rounded-full bg-emerald-500/20 border border-emerald-500/30 flex items-center justify-center">
                    <svg class="w-[3rem] h-[3rem] text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
            </div>
            <h3 class="text-[2.8rem] text-sub font-bold mt-[1rem]">Success!</h3>
            <p class="font-normal text-[1.6rem] text-text/80 my-[2rem] leading-relaxed">
                Your password has been successfully changed. You can now use your new password to log in.
            </p>
        </div>

        <div class="my-[2.5rem]">
            <a href="{% url 'account_login' %}" class="btn btn--sub text-[1.4rem]">
                Log In Now
            </a>
        </div>
    </div>
</div>
{% endblock content %}
