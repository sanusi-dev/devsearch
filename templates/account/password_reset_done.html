{% extends "auth_base.html" %}
{% load static %}

{% block title %}Email sent - DevSearch{% endblock title %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-8 sm:py-12 bg-sub">
    <div class="w-full max-w-[38rem] card shadow-[0_10px_50px_rgba(0,0,0,0.25)] animate-slide-up text-center">
        <div>
            <a href="/">
                <img src="{% static 'images/icon.svg' %}" alt="DevSearch" class="mx-auto h-16 sm:h-20" />
            </a>
            <div class="mt-8 mb-4 flex justify-center">
                <div class="w-20 h-20 rounded-full bg-emerald-500/15 border border-emerald-500/25 flex items-center justify-center">
                    <svg class="w-10 h-10 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                    </svg>
                </div>
            </div>
            <h1 class="text-[2.2rem] sm:text-[2.5rem] text-sub font-semibold tracking-tight">Check your inbox</h1>
            <p class="mt-3 text-[1.5rem] text-text/80 leading-relaxed max-w-[32rem] mx-auto">
                We've sent password reset instructions to your email address.<br>
                Please check your inbox and spam folder.
            </p>
        </div>

        <div class="mt-8">
            <a href="{% url 'account_login' %}" class="btn btn--sub text-[1.45rem]">Back to login</a>
        </div>
    </div>
</div>
{% endblock content %}
