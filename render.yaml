services:
  - type: web
    name: devsearch
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py ensure_superuser && python manage.py seed_tags"
    startCommand: "python manage.py runmailer & gunicorn devsearch.wsgi --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: devsearch.settings.prod
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DEV_EMAIL_USER
        value: "demo@example.com"
      - key: DEV_EMAIL_PASSWORD
        value: "dummypassword"
      - key: B2_APPLICATION_KEY_ID
        value: "0055317cf219e960000000002"
      - key: B2_APPLICATION_KEY
        value: "K005v6HXVuX6+NBJbIrElIRn3LljIoo"
      - key: B2_ENDPOINT
        value: "https://s3.us-east-005.backblazeb2.com"
      - key: B2_BUCKET_NAME
        value: "devsearchh"
      - key: B2_REGION
        value: "us-east-005"
      - key: DATABASE_URL
        fromDatabase:
          name: devsearch-db
          property: connectionString

databases:
  - name: devsearch-db
    databaseName: devsearch
    plan: free
